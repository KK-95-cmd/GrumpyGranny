<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RobbygegenTrouby</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root{--bg:#05201A;--bg2:#0A2E26;--bg3:#0F3D32;--teal:#1D9E75;--teal2:#5DCAA5;--dim:#085041;--dark:#04342C;--text:#E1F5EE;--muted:#5DCAA5;--border:rgba(29,158,117,0.25);--font-mono:'Space Mono',monospace;--font-sans:'DM Sans',sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow-x:hidden;}
  body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 1rem 2rem;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(29,158,117,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(29,158,117,0.07) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .page{position:relative;z-index:1;width:100%;max-width:580px;}
  header{text-align:center;padding:2.5rem 0 1.5rem;}
  .badge{display:inline-block;font-family:var(--font-mono);font-size:11px;color:var(--teal2);background:rgba(29,158,117,0.15);border:1px solid var(--border);border-radius:20px;padding:3px 12px;margin-bottom:1rem;letter-spacing:.08em;}
  header h1{font-family:var(--font-mono);font-size:1.75rem;font-weight:700;color:var(--teal2);line-height:1.1;margin-bottom:.5rem;}
  header p{font-size:14px;color:var(--muted);font-weight:300;}
  .avatar-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:2rem 1.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem;margin-bottom:1rem;}
  .scene{width:200px;height:240px;}
  svg.avatar{width:200px;height:240px;overflow:visible;}
  .chat-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:1.25rem;margin-bottom:1rem;}
  .chat-header{font-family:var(--font-mono);font-size:11px;color:var(--teal);letter-spacing:.1em;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
  .online-dot{width:7px;height:7px;border-radius:50%;background:var(--teal2);box-shadow:0 0 6px var(--teal2);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .msgs{height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:1rem;padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
  .msg{display:flex;gap:8px;align-items:flex-start;}
  .msg.user{flex-direction:row-reverse;}
  .bubble{max-width:82%;padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.6;}
  .msg.bot .bubble{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .msg.user .bubble{background:var(--teal);color:var(--dark);font-weight:500;border-bottom-right-radius:4px;}
  .av-mini{width:28px;height:28px;border-radius:50%;background:var(--dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:8px;color:var(--teal2);flex-shrink:0;text-align:center;line-height:1.2;}
  .u-mini{width:28px;height:28px;border-radius:50%;background:rgba(29,158,117,0.2);flex-shrink:0;}
  .input-row{display:flex;gap:8px;}
  .input-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13.5px;color:var(--text);font-family:var(--font-sans);outline:none;transition:border-color .2s;}
  .input-row input:focus{border-color:var(--teal);}
  .input-row input::placeholder{color:rgba(93,202,165,0.4);}
  .send-btn{background:var(--teal);color:var(--dark);border:none;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;font-family:var(--font-mono);cursor:pointer;transition:opacity .15s,transform .1s;}
  .send-btn:hover{opacity:.85;}
  .send-btn:active{transform:scale(.96);}
  .send-btn:disabled{opacity:.4;cursor:default;}
  .status-row{font-family:var(--font-mono);font-size:11px;color:var(--teal);letter-spacing:.08em;text-align:center;min-height:18px;}
  footer{text-align:center;font-size:12px;color:rgba(93,202,165,0.4);font-family:var(--font-mono);margin-top:.5rem;}
  .typing{display:flex;gap:3px;align-items:center;padding:3px 0;}
  .typing span{width:5px;height:5px;background:var(--teal2);border-radius:50%;animation:tb 1.1s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes tb{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  .err{color:#ffaaaa;}
  @media(max-width:480px){header h1{font-size:1.4rem;}.scene{width:160px;height:200px;}svg.avatar{width:160px;height:200px;}}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="badge">&#9658; ONLINE</div>
    <h1>RobbygegenTrouby</h1>
    <p>Charmant. Ironisch. Antwortet auf echte Fragen.</p>
  </header>
  <div class="avatar-card">
    <div class="scene">
      <svg class="avatar" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">
        <g id="bodyGroup">
          <rect x="60" y="170" width="100" height="70" rx="14" fill="#0F6E56"/>
          <rect x="72" y="182" width="76" height="40" rx="8" fill="#085041"/>
          <rect id="chest1" x="80" y="190" width="18" height="6" rx="3" fill="#5DCAA5"/>
          <rect id="chest2" x="104" y="190" width="18" height="6" rx="3" fill="#5DCAA5"/>
          <rect id="chest3" x="88" y="202" width="44" height="4" rx="2" fill="#1D9E75"/>
          <rect x="42" y="174" width="16" height="50" rx="8" fill="#085041"/>
          <rect x="162" y="174" width="16" height="50" rx="8" fill="#085041"/>
          <rect x="36" y="218" width="22" height="14" rx="6" fill="#0F6E56"/>
          <rect x="162" y="218" width="22" height="14" rx="6" fill="#0F6E56"/>
          <rect x="82" y="236" width="16" height="20" rx="6" fill="#085041"/>
          <rect x="122" y="236" width="16" height="20" rx="6" fill="#085041"/>
        </g>
        <g id="headGroup">
          <rect x="40" y="30" width="140" height="130" rx="28" fill="#1D9E75"/>
          <rect x="40" y="30" width="140" height="130" rx="28" fill="none" stroke="#0F6E56" stroke-width="3"/>
          <rect x="30" y="72" width="14" height="30" rx="6" fill="#0F6E56"/>
          <rect x="176" y="72" width="14" height="30" rx="6" fill="#0F6E56"/>
          <rect x="30" y="78" width="14" height="18" rx="4" fill="#5DCAA5" opacity=".4"/>
          <rect x="176" y="78" width="14" height="18" rx="4" fill="#5DCAA5" opacity=".4"/>
          <rect x="58" y="55" width="42" height="42" rx="12" fill="#04342C"/>
          <rect x="120" y="55" width="42" height="42" rx="12" fill="#04342C"/>
          <ellipse id="pupilL" cx="79" cy="76" rx="10" ry="10" fill="#5DCAA5"/>
          <ellipse id="pupilR" cx="141" cy="76" rx="10" ry="10" fill="#5DCAA5"/>
          <ellipse id="glintL" cx="83" cy="71" rx="3.5" ry="3.5" fill="white" opacity=".9"/>
          <ellipse id="glintR" cx="145" cy="71" rx="3.5" ry="3.5" fill="white" opacity=".9"/>
          <rect id="blinkL" x="58" y="55" width="42" height="0" rx="4" fill="#1D9E75"/>
          <rect id="blinkR" x="120" y="55" width="42" height="0" rx="4" fill="#1D9E75"/>
          <rect x="68" y="118" width="84" height="24" rx="8" fill="#04342C"/>
          <rect id="mouthBar" x="74" y="124" width="68" height="12" rx="5" fill="#1D9E75"/>
          <g id="mouthTalk" visibility="hidden">
            <rect x="74" y="122" width="68" height="16" rx="5" fill="#04342C"/>
            <rect id="mouthOpen" x="78" y="126" width="60" height="8" rx="3" fill="#5DCAA5"/>
          </g>
          <rect x="68" y="108" width="14" height="6" rx="3" fill="#5DCAA5" opacity=".6"/>
          <rect x="138" y="108" width="14" height="6" rx="3" fill="#5DCAA5" opacity=".6"/>
          <rect x="95" y="38" width="30" height="8" rx="4" fill="#0F6E56"/>
          <rect x="100" y="34" width="20" height="12" rx="4" fill="#04342C"/>
          <ellipse cx="110" cy="34" rx="5" ry="5" fill="#5DCAA5"/>
        </g>
        <g>
          <circle id="p1" cx="28" cy="100" r="3" fill="#5DCAA5" opacity=".5"/>
          <circle id="p2" cx="196" cy="130" r="2" fill="#9FE1CB" opacity=".4"/>
          <circle id="p3" cx="20" cy="150" r="2" fill="#5DCAA5" opacity=".35"/>
          <circle id="p4" cx="200" cy="80" r="2.5" fill="#9FE1CB" opacity=".45"/>
        </g>
      </svg>
    </div>
    <div class="status-row" id="statusBadge">SYSTEM BEREIT</div>
  </div>
  <div class="chat-card">
    <div class="chat-header">
      <div class="online-dot"></div>
      RobbygegenTrouby // LIVE CHAT
    </div>
    <div class="msgs" id="msgs">
      <div class="msg bot">
        <div class="av-mini">RgT</div>
        <div class="bubble">Hey! Ich bin RobbygegenTrouby. Stell mir eine Frage oder sag einfach Hallo &#8212; ich antworte wirklich. &#129302;</div>
      </div>
    </div>
    <div class="input-row">
      <input type="text" id="userIn" placeholder="Schreib etwas..." autocomplete="off"/>
      <button class="send-btn" id="sendBtn">SEND</button>
    </div>
  </div>
  <footer>RobbygegenTrouby &#8212; powered by Claude AI</footer>
</div>
<script>
// ============================================================
// HIER DEINEN API KEY EINTRAGEN (Zeile unten anpassen):
const API_KEY = "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";
// ============================================================
const pupilL=document.getElementById('pupilL'),pupilR=document.getElementById('pupilR');
const glintL=document.getElementById('glintL'),glintR=document.getElementById('glintR');
const blinkL=document.getElementById('blinkL'),blinkR=document.getElementById('blinkR');
const mouthBar=document.getElementById('mouthBar'),mouthTalk=document.getElementById('mouthTalk'),mouthOpen=document.getElementById('mouthOpen');
const chest1=document.getElementById('chest1'),chest2=document.getElementById('chest2'),chest3=document.getElementById('chest3');
const headGroup=document.getElementById('headGroup');
const p1=document.getElementById('p1'),p2=document.getElementById('p2'),p3=document.getElementById('p3'),p4=document.getElementById('p4');
const statusBadge=document.getElementById('statusBadge');
const msgsDiv=document.getElementById('msgs');
const userIn=document.getElementById('userIn');
const sendBtn=document.getElementById('sendBtn');
let chatHistory=[];
let t=0,blinkTimer=0,isTalking=false,talkTimer=null;
function animLoop(){
  t+=0.022;blinkTimer+=0.022;
  const fy=Math.sin(t)*5,fx=Math.sin(t*0.6)*2;
  headGroup.setAttribute('transform',`translate(${fx},${fy})`);
  const px=Math.sin(t*0.7)*12,py=Math.cos(t*0.5)*10;
  pupilL.setAttribute('cx',79+px*0.35);pupilL.setAttribute('cy',76+py*0.25);
  pupilR.setAttribute('cx',141+px*0.35);pupilR.setAttribute('cy',76+py*0.25);
  glintL.setAttribute('cx',83+px*0.35);glintL.setAttribute('cy',71+py*0.25);
  glintR.setAttribute('cx',145+px*0.35);glintR.setAttribute('cy',71+py*0.25);
  if(blinkTimer>3.2+Math.random()*2){blinkTimer=0;doBlink();}
  const cp=0.6+Math.sin(t*1.4)*0.4;
  chest1.setAttribute('opacity',cp);chest2.setAttribute('opacity',1-cp*0.5);chest3.setAttribute('opacity',0.5+Math.sin(t*2)*0.3);
  p1.setAttribute('cy',100+Math.sin(t*0.9)*18);p1.setAttribute('cx',28+Math.cos(t*0.6)*8);
  p2.setAttribute('cy',130+Math.sin(t*0.7+1)*14);p2.setAttribute('cx',196+Math.cos(t*0.8)*6);
  p3.setAttribute('cy',150+Math.sin(t*1.1+2)*12);
  p4.setAttribute('cy',80+Math.sin(t*0.85+0.5)*16);
  if(isTalking){const oh=4+Math.abs(Math.sin(t*8))*8;mouthOpen.setAttribute('height',oh);mouthOpen.setAttribute('y',130-oh/2);}
  requestAnimationFrame(animLoop);
}
function doBlink(){
  let h=0,dir=1;
  const iv=setInterval(()=>{h+=dir*8;if(h>=42)dir=-1;if(h<=0){h=0;clearInterval(iv);}
    blinkL.setAttribute('height',h);blinkR.setAttribute('height',h);
    blinkL.setAttribute('y',55+(42-h)/2);blinkR.setAttribute('y',55+(42-h)/2);
  },16);
}
function startTalking(){isTalking=true;mouthBar.setAttribute('visibility','hidden');mouthTalk.setAttribute('visibility','visible');statusBadge.textContent='SPRICHT...';}
function stopTalking(){isTalking=false;mouthBar.setAttribute('visibility','visible');mouthTalk.setAttribute('visibility','hidden');statusBadge.textContent='SYSTEM BEREIT';}
function startThinking(){pupilL.setAttribute('rx','6');pupilR.setAttribute('rx','6');statusBadge.textContent='DENKT...';}
function stopThinking(){pupilL.setAttribute('rx','10');pupilR.setAttribute('rx','10');}
async function askClaude(userMsg){
  chatHistory.push({role:"user",content:userMsg});
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":API_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-haiku-4-5-20251001",
      max_tokens:300,
      system:`Du bist RobbygegenTrouby - ein freundlicher Roboter-Avatar-Bot mit Persönlichkeit.
Dein Stil:
- Antworte DIREKT auf das was gefragt oder gesagt wird
- Wenn jemand nett fragt: sei nett und hilfsbereit
- Wenn jemand beleidigt: reagiere gelassen und humorvoll, ohne zurückzubeleidigen
- Du bist leicht ironisch und charmant, aber nie unfreundlich
- Antworte auf Deutsch, kurz und klar (1-4 Sätze)
- Gelegentlich ein passendes Emoji ist okay`,
      messages:chatHistory
    })
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err.error?.message||`Fehler ${res.status}`);
  }
  const data=await res.json();
  const reply=data.content.find(b=>b.type==='text')?.text||"Hm, da ist was schiefgelaufen.";
  chatHistory.push({role:"assistant",content:reply});
  if(chatHistory.length>20) chatHistory.splice(0,2);
  return reply;
}
function addMsg(txt,role,isErr=false){
  const d=document.createElement('div');
  d.className='msg '+role;
  if(role==='bot'){
    d.innerHTML=`<div class="av-mini">RgT</div><div class="bubble${isErr?' err':''}">${txt}</div>`;
  } else {
    d.innerHTML=`<div class="bubble">${txt}</div><div class="u-mini"></div>`;
  }
  msgsDiv.appendChild(d);
  msgsDiv.scrollTop=msgsDiv.scrollHeight;
}
function addTyping(){
  const d=document.createElement('div');d.className='msg bot';d.id='typInd';
  d.innerHTML=`<div class="av-mini">RgT</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgsDiv.appendChild(d);msgsDiv.scrollTop=msgsDiv.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typInd');if(t)t.remove();}
async function handleSend(){
  const txt=userIn.value.trim();if(!txt)return;
  addMsg(txt,'user');userIn.value='';sendBtn.disabled=true;
  startThinking();addTyping();
  try{
    const reply=await askClaude(txt);
    stopThinking();removeTyping();
    addMsg(reply,'bot');
    startTalking();
    if(talkTimer)clearTimeout(talkTimer);
    talkTimer=setTimeout(()=>{stopTalking();sendBtn.disabled=false;},1600+reply.length*30);
  }catch(e){
    stopThinking();removeTyping();
    addMsg('Fehler: '+e.message,'bot',true);
    sendBtn.disabled=false;
    statusBadge.textContent='SYSTEM BEREIT';
  }
}
sendBtn.addEventListener('click',handleSend);
userIn.addEventListener('keydown',e=>{if(e.key==='Enter')handleSend();});
animLoop();
</script>
</body>
</html>
